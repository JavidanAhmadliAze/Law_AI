name: law-ai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES__USER:-lawai}
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD:-lawai}
      POSTGRES_DB: ${POSTGRES__DB:-lawai}
    ports:
      - "5434:5432"   # 5432/5433 taken by other local projects
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-airflow-db.sql:/docker-entrypoint-initdb.d/init-airflow-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawai"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"          # local dev only
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    profiles: ["debug"]                        # start with: docker compose --profile debug up

  tei:
    # serves embeddings over the TEI protocol — used by Airflow (ingest) and
    # the app (query embedding); model weights cached in a volume
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    command: --model-id ${EMBEDDING__MODEL:-BAAI/bge-m3} --max-client-batch-size 64
    ports:
      - "8081:80"
    volumes:
      - tei-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 80   # first boot downloads the model (~2 GB)

  airflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://lawai:lawai@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      # pipeline settings (same env contract as the app)
      POSTGRES__HOST: postgres
      OPENSEARCH__HOST: opensearch
      EMBEDDING__PROVIDER: api
      EMBEDDING__API_URL: http://tei:80
      EMBEDDING__MODEL: ${EMBEDDING__MODEL:-BAAI/bge-m3}
      EMBEDDING__DIMENSION: "1024"
    ports:
      - "8080:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data   # downloaded PDFs + intermediate artifacts, inspectable from host
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    command: standalone

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES__HOST: postgres
      OPENSEARCH__HOST: opensearch
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    profiles: ["app"]                          # start with: docker compose --profile app up

volumes:
  postgres-data:
  opensearch-data:
  tei-cache:
